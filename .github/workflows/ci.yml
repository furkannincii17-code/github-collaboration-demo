name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt
      - name: Testleri calistir
        run: pytest -v
